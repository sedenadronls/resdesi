<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desi Dragon </title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#0A0A0A', gold: '#D4AF37', goldLight: '#FFC72C' },
                    fontFamily: { serif: ['Cinzel', 'serif'], sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-dark text-white overflow-x-hidden">

    <div id="loader" class="fixed inset-0 z-[100] bg-dark flex flex-col items-center justify-center">
        <div class="w-20 h-20 border-2 border-gold border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-serif tracking-[0.3em] text-gold animate-pulse">DESI DRAGON</p>
    </div>

    <canvas id="hero-canvas" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <nav class="fixed w-full z-50 px-8 py-6 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gold rounded-full flex items-center justify-center text-black font-bold">DD</div>
            <span class="font-serif text-xl tracking-widest hidden md:block">DESI <span class="text-gold">DRAGON</span></span>
        </div>
        <div class="flex gap-6 items-center">
            <button class="px-6 py-2 bg-gold text-black font-bold font-serif hover:bg-goldLight transition-all">RESERVE</button>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h2 id="hero-sub" class="text-goldLight font-serif tracking-[0.4em] uppercase mb-4 opacity-0">Desi Taste, Chinese Flame</h2>
        <h1 id="hero-title" class="text-6xl md:text-9xl font-serif font-bold gold-text mb-8 opacity-0">DESI DRAGON</h1>
        <div id="hero-btns" class="flex gap-4 opacity-0">
            <button class="px-8 py-4 bg-gold text-black font-bold hover:scale-105 transition-transform">VIEW MENU</button>
            <button class="px-8 py-4 border border-gold text-gold hover:bg-gold/10 transition-all">ORDER NOW</button>
        </div>
    </section>

    <section id="menu-section" class="py-24 px-6 relative z-10 bg-black/40 backdrop-blur-lg">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-center text-5xl font-serif text-gold mb-16">The Master Menu</h2>
            <div id="menu-tabs" class="flex flex-wrap justify-center gap-4 mb-12">
                <!-- Tabs injected by JS -->
            </div>
            <div id="menu-grid" class="grid md:grid-cols-2 gap-8 transition-all duration-500">
                <!-- Items injected by JS -->
            </div>
        </div>
    </section>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/three-scene.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/menu-logic.js"></script>
</body>
</html>
